apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  labels:
    app: rag-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
    spec:
      containers:
        - name: rag-backend
          image: rag-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: CHROMA_PERSIST_DIR
              value: "/app/chroma_db"
            - name: LLAMA_HOST
              value: "llama-service"
            - name: LLAMA_PORT
              value: "8080"
            - name: PDF_DIR
              value: "/app/pdfs"
            - name: CORS_ORIGIN
              value: "*"
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/chroma_db
            - name: pdf-storage
              mountPath: /app/pdfs
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: rag-backend-storage
        - name: pdf-storage
          emptyDir: {}

