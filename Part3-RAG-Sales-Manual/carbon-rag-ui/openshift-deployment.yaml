apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbon-rag-ui
  labels:
    app: carbon-rag-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carbon-rag-ui
  template:
    metadata:
      labels:
        app: carbon-rag-ui
    spec:
      containers:
      - name: carbon-rag-ui
        image: image-registry.openshift-image-registry.svc:5000/llm-on-techzone/carbon-rag-ui:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_RAG_BACKEND_URL
          value: "https://rag-backend-llm-on-techzone.apps.p1219.cecc.ihost.com"
        - name: NODE_ENV
          value: "production"
        - name: NEXT_TELEMETRY_DISABLED
          value: "1"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: carbon-rag-ui
  labels:
    app: carbon-rag-ui
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: carbon-rag-ui
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: carbon-rag-ui
  labels:
    app: carbon-rag-ui
spec:
  to:
    kind: Service
    name: carbon-rag-ui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

