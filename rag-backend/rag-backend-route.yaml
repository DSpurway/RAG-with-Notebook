apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rag-backend
  labels:
    app: rag-backend
spec:
  to:
    kind: Service
    name: rag-backend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

