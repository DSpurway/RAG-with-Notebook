apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-service
  labels:
    app: llama-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-service
  template:
    metadata:
      labels:
        app: llama-service
    spec:
      nodeSelector:
        feature.node.kubernetes.io/cpu-cpuid.MMA: "true"
      containers:
        - name: llama-cpp
          # Build from the new Dockerfile in Part1-Deploy-LLM directory
          # This image contains BOTH TinyLlama and Granite 4.0 models
          image: llama-service:dual-model
          imagePullPolicy: IfNotPresent
          env:
            # Set to "tinyllama" for Part 1 (basic demos)
            # Set to "granite" for Part 2/3 (RAG with complex documents)
            - name: LLM_MODEL
              value: "tinyllama"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
